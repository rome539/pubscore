    // =====================================================================
    // RENDER — Profile Card
    // =====================================================================

    function renderProfileCard(pubkey, npub, profile, follows, reviews) {
        const avatar = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
        const name = sanitizeDisplayName(profile.display_name || profile.name || 'Unknown');
        const { preview: bio } = sanitizeBio(profile.about || '', 200);
        const nip05 = sanitizeNip05(profile.nip05);
        const followCount = follows.length;

        // Calculate average rating
        let avgRating = 0;
        let totalReviews = reviews.length;
        if (totalReviews > 0) {
            const sum = reviews.reduce((acc, r) => {
                const tag = r.tags.find(t => t[0] === 'rating');
                return acc + (tag ? parseInt(tag[1]) || 0 : 0);
            }, 0);
            avgRating = (sum / totalReviews).toFixed(1);
        }

        document.getElementById('profileArea').innerHTML = `
            <div class="profile-card anim">
                <div class="pc-top">
                    <img class="pc-avatar" src="${avatar}" onerror="this.src='${DEFAULT_AVATAR}'">
                    <div class="pc-info">
                        <div class="pc-name">${name}</div>
                        ${nip05 ? `<div class="pc-nip05">${nip05}</div>` : ''}
                        <div class="pc-npub">${escapeHtml(npub)}</div>
                    </div>
                </div>
                ${bio ? `<div class="pc-bio">${bio}</div>` : ''}
                <div class="pc-rating-row">
                    <div class="pc-big-score">${avgRating > 0 ? avgRating : '--'}</div>
                    <div>
                        ${avgRating > 0 ? starsHtml(Math.round(avgRating), '1.3rem') : ''}
                        <div class="pc-score-detail">
                            <strong>${totalReviews}</strong> review${totalReviews !== 1 ? 's' : ''}
                            ${followCount > 0
                                ? ` &middot; following <strong>${followCount > 999 ? (followCount / 1000).toFixed(1) + 'k' : followCount}</strong>`
                                : ''}
                        </div>
                    </div>
                </div>
            </div>
        `;
    }

    // =====================================================================
    // RENDER — Review Form
    // =====================================================================

    let selectedRating = 0;
    let selectedCategories = new Set();

    async function renderReviewForm() {
        const area = document.getElementById('reviewFormArea');

        if (!currentUser || !currentLookupPubkey) {
            area.innerHTML = '';
            return;
        }

        // Can't review yourself
        if (currentUser.pubkey === currentLookupPubkey) {
            area.innerHTML = '<div class="review-form anim" style="text-align:center;color:var(--text-3);padding:20px;">You can\'t review yourself</div>';
            return;
        }

        // Check for existing review (to show "update" mode)
        const existing = currentReviews.find(r => r.pubkey === currentUser.pubkey);
        const existingContent = existing ? escapeHtml(existing.content) : '';
        const existingRating = existing ? parseInt(existing.tags.find(t => t[0] === 'rating')?.[1] || '0') : 0;
        const existingCats = existing ? existing.tags.filter(t => t[0] === 't').map(t => t[1]) : [];

        selectedRating = existingRating;
        selectedCategories = new Set(existingCats);

        area.innerHTML = `
            <div class="review-form anim">
                <div class="rf-title">${existing ? 'Update your review' : 'Leave a review'}</div>

                <div class="rf-row">
                    <div class="rf-label">Rating</div>
                    <div class="star-input" id="starInput">
                        ${[1,2,3,4,5].map(i =>
                            `<button class="${i <= selectedRating ? 'filled' : ''}" data-r="${i}" onclick="window._setRating(${i})">&#9733;</button>`
                        ).join('')}
                    </div>
                </div>

                <div class="rf-row">
                    <div class="rf-label">Category (optional)</div>
                    <div class="cat-tags">
                        <button class="cat-tag ${selectedCategories.has('trade') ? 'sel' : ''}" data-cat="trade" onclick="window._toggleCat('trade',this)">Trustworthy</button>
                        <button class="cat-tag ${selectedCategories.has('knowledge') ? 'sel' : ''}" data-cat="knowledge" onclick="window._toggleCat('knowledge',this)">Knowledgeable</button>
                        <button class="cat-tag ${selectedCategories.has('helpful') ? 'sel' : ''}" data-cat="helpful" onclick="window._toggleCat('helpful',this)">Helpful</button>
                        <button class="cat-tag ${selectedCategories.has('warning') ? 'sel' : ''}" data-cat="warning" onclick="window._toggleCat('warning',this)">Warning</button>
                    </div>
                </div>

                <div class="rf-row">
                    <div class="rf-label">Your review</div>
                    <textarea class="rf-textarea" id="reviewContent" placeholder="Share your experience..." maxlength="2000">${existingContent}</textarea>
                </div>

                <button class="btn btn-accent" onclick="window._submitReview()" id="submitBtn">
                    ${existing ? 'Update review' : 'Publish review'}
                </button>
            </div>
        `;
    }

    /** Set star rating */
    window._setRating = function(rating) {
        selectedRating = rating;
        document.querySelectorAll('#starInput button').forEach(btn => {
            btn.classList.toggle('filled', parseInt(btn.dataset.r) <= rating);
        });
    };

    /** Toggle a category tag */
    window._toggleCat = function(category, element) {
        if (selectedCategories.has(category)) {
            selectedCategories.delete(category);
            element.classList.remove('sel');
        } else {
            selectedCategories.add(category);
            element.classList.add('sel');
        }
    };

    /** Submit or update a review */
    window._submitReview = async function() {
        if (!currentUser) return toast('Sign in first', 'error');
        if (!selectedRating) return toast('Select a rating', 'error');

        const content = document.getElementById('reviewContent').value.trim();
        if (!content) return toast('Write a review', 'error');
        if (content.length > 2000) return toast('Too long (2000 max)', 'error');

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.textContent = 'Publishing...';

        try {
            await publishReview(currentLookupPubkey, selectedRating, content, Array.from(selectedCategories));
            toast('Review published', 'success');

            // Refresh everything
            const reviews = await fetchReviews(currentLookupPubkey);
            currentReviews = reviews;
            renderReviews(reviews);

            const [profile, follows] = await Promise.all([
                fetchProfile(currentLookupPubkey),
                fetchFollows(currentLookupPubkey)
            ]);
            renderProfileCard(currentLookupPubkey, NostrTools.nip19.npubEncode(currentLookupPubkey), profile, follows, reviews);
            await renderReviewForm();
        } catch (e) {
            toast('Failed: ' + e.message, 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = 'Publish review';
        }
    };

    // =====================================================================
    // RENDER — Reviews List
    // =====================================================================

    function renderReviews(reviews) {
        const area = document.getElementById('reviewsArea');

        if (!reviews.length) {
            area.innerHTML = '<div class="empty anim">No reviews yet. Be the first.</div>';
            return;
        }

        const sorted = sortReviews(reviews, currentSort);
        const totalPages = Math.ceil(sorted.length / REVIEWS_PER_PAGE);
        const showCount = Math.min((currentPage + 1) * REVIEWS_PER_PAGE, sorted.length);
        const visible = sorted.slice(0, showCount);
        const hasMore = showCount < sorted.length;

        area.innerHTML = `
            <div class="reviews-header anim">
                <h3>${reviews.length} review${reviews.length !== 1 ? 's' : ''}</h3>
                <div class="sort-pills">
                    ${['newest', 'oldest', 'highest', 'lowest'].map(s =>
                        `<button class="sort-pill ${currentSort === s ? 'on' : ''}" onclick="window._sort('${s}')">${s[0].toUpperCase() + s.slice(1)}</button>`
                    ).join('')}
                </div>
            </div>
            ${visible.map((r, i) => renderCard(r, i)).join('')}
            ${hasMore ? `
                <div class="pagination anim">
                    <button onclick="window._showMore()">Show more</button>
                    <div class="pagination-info">Showing ${showCount} of ${sorted.length}</div>
                </div>
            ` : ''}
        `;

        // Lazy-load reviewer profile names and avatars
        visible.forEach(async (review) => {
            const profile = await getProfile(review.pubkey);
            const card = document.querySelector(`[data-rpk="${review.pubkey}"]`);
            if (card && profile) {
                const nameEl = card.querySelector('.rc-name');
                const imgEl = card.querySelector('.rc-avi');
                if (profile.name || profile.display_name) {
                    nameEl.textContent = capLength(profile.display_name || profile.name, 40);
                }
                if (profile.picture) {
                    imgEl.src = sanitizeUrl(profile.picture);
                }
            }
        });
    }

    /** Show more reviews (next page) */
    window._showMore = function() {
        currentPage++;
        renderReviews(currentReviews);
        // Scroll the new content into view smoothly
        const cards = document.querySelectorAll('.rc');
        if (cards.length > 0) {
            const target = cards[cards.length - Math.min(REVIEWS_PER_PAGE, cards.length)];
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
    };

    /** Render a single review card */
    function renderCard(review, index) {
        const npub = NostrTools.nip19.npubEncode(review.pubkey);
        const content = escapeHtml(capLength(review.content, 1000));
        const categories = review.categories.map(catTag).join('');
        const isOwn = currentUser && review.pubkey === currentUser.pubkey;

        return `
            <div class="rc anim" style="animation-delay:${index * 0.04}s" data-rpk="${review.pubkey}">
                <div class="rc-top">
                    <img class="rc-avi" src="${DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'">
                    <div class="rc-who">
                        <div class="rc-name">${shortNpub(npub)}</div>
                        <div class="rc-npub">${shortNpub(npub)}</div>
                    </div>
                    <div class="rc-right">
                        ${starsHtml(review.rating, '1rem')}
                        <div class="rc-date">${fmtDate(review.created_at)}</div>
                    </div>
                </div>
                <div class="rc-body">${content}</div>
                <div class="rc-foot">
                    <div class="rc-tags">${categories}</div>
                    ${isOwn ? `<button class="btn-red" onclick="window._del('${review.id}','lookup')">Delete</button>` : ''}
                </div>
            </div>
        `;
    }

    /** Change sort order */
    window._sort = function(sortBy) {
        currentSort = sortBy;
        currentPage = 0;
        renderReviews(currentReviews);
    };

    /** Delete a review */
    window._del = async function(eventId, context) {
        if (!currentUser) return toast('Sign in first', 'error');
        if (!confirm('Delete this review?')) return;

        try {
            await deleteReview(eventId);
            toast('Deletion request sent', 'success');

            if (context === 'lookup' && currentLookupPubkey) {
                // Remove from local array and re-render
                currentReviews = currentReviews.filter(r => r.id !== eventId);
                renderReviews(currentReviews);

                const [profile, follows] = await Promise.all([
                    fetchProfile(currentLookupPubkey),
                    fetchFollows(currentLookupPubkey)
                ]);
                renderProfileCard(
                    currentLookupPubkey,
                    NostrTools.nip19.npubEncode(currentLookupPubkey),
                    profile, follows, currentReviews
                );
                await renderReviewForm();
            } else if (context === 'history') {
                loadHistory();
            }
        } catch (e) {
            toast('Delete failed: ' + e.message, 'error');
        }
    };

    // =====================================================================
    // MY PROFILE & REVIEWS HISTORY
    // =====================================================================

    let historyTab = 'received'; // 'received' | 'written'

    async function loadHistory() {
        const area = document.getElementById('historyArea');

        if (!currentUser) {
            area.innerHTML = '<div class="empty">Sign in to see your profile</div>';
            return;
        }

        area.innerHTML = '<div class="loader anim"><div class="spin"></div>Loading your profile...</div>';

        try {
            const [profile, follows, receivedReviews, writtenReviews] = await Promise.all([
                fetchProfile(currentUser.pubkey),
                fetchFollows(currentUser.pubkey),
                fetchReviews(currentUser.pubkey),
                fetchMyReviews(currentUser.pubkey)
            ]);

            const npub = currentUser.npub;
            const avatar = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
            const name = sanitizeDisplayName(profile.display_name || profile.name || 'Unknown');
            const { preview: bio } = sanitizeBio(profile.about || '', 200);
            const nip05 = sanitizeNip05(profile.nip05);

            // Calculate score from received reviews
            const parsed = receivedReviews.map(parseReview);
            const avgRating = parsed.length
                ? (parsed.reduce((s, r) => s + r.rating, 0) / parsed.length).toFixed(1)
                : 0;

            area.innerHTML = `
                <div class="profile-card anim">
                    <div class="pc-top">
                        <img class="pc-avatar" src="${avatar}" onerror="this.src='${DEFAULT_AVATAR}'">
                        <div class="pc-info">
                            <div class="pc-name">${escapeHtml(name)}</div>
                            ${nip05 ? `<div class="pc-nip05">${escapeHtml(nip05)}</div>` : ''}
                            <div class="pc-npub">${escapeHtml(npub)}</div>
                        </div>
                    </div>
                    ${bio ? `<div class="pc-bio">${bio}</div>` : ''}
                    <div class="pc-rating-row">
                        <div class="pc-big-score">${avgRating > 0 ? avgRating : '--'}</div>
                        <div>
                            ${avgRating > 0 ? starsHtml(Math.round(avgRating), '1.3rem') : ''}
                            <div class="pc-score-detail">
                                <strong>${receivedReviews.length}</strong> review${receivedReviews.length !== 1 ? 's' : ''} received
                                ${follows.length > 0 ? ` &middot; following <strong>${follows.length > 999 ? (follows.length/1000).toFixed(1)+'k' : follows.length}</strong>` : ''}
                            </div>
                        </div>
                    </div>
                </div>

                <div class="hist-tabs anim">
                    <button class="hist-tab ${historyTab === 'received' ? 'active' : ''}" onclick="window._histTab('received')">
                        Reviews I received <span class="hist-tab-count">${receivedReviews.length}</span>
                    </button>
                    <button class="hist-tab ${historyTab === 'written' ? 'active' : ''}" onclick="window._histTab('written')">
                        Reviews I wrote <span class="hist-tab-count">${writtenReviews.length}</span>
                    </button>
                </div>

                <div id="histReviewsArea"></div>
            `;

            // Store for tab switching
            window._histData = { receivedReviews, writtenReviews };
            renderHistoryReviews();

        } catch (e) {
            area.innerHTML = '<div class="empty">Error loading profile</div>';
            console.error(e);
        }
    }

    window._histTab = function(tab) {
        historyTab = tab;
        document.querySelectorAll('.hist-tab').forEach(b => {
            b.classList.toggle('active', b.textContent.trim().startsWith(tab === 'received' ? 'Reviews I received' : 'Reviews I wrote'));
        });
        renderHistoryReviews();
    };

    function renderHistoryReviews() {
        const area = document.getElementById('histReviewsArea');
        if (!area || !window._histData) return;

        const { receivedReviews, writtenReviews } = window._histData;
        const isReceived = historyTab === 'received';
        const reviews = isReceived ? receivedReviews : writtenReviews;
        const parsed = reviews.map(parseReview).sort((a, b) => b.created_at - a.created_at);

        if (!parsed.length) {
            area.innerHTML = `<div class="empty anim">${isReceived ? 'No reviews received yet' : 'No reviews written yet'}</div>`;
            return;
        }

        let html = '';
        for (const review of parsed) {
            if (isReceived) {
                // Show who wrote the review (reviewer = review.pubkey)
                const reviewerNpub = NostrTools.nip19.npubEncode(review.pubkey);
                const content = escapeHtml(capLength(review.content, 500));
                const categories = review.categories.map(catTag).join('');
                html += `
                    <div class="rc anim" data-hrpk="${review.pubkey}" data-rid="${review.id}">
                        <div class="rc-top">
                            <img class="rc-avi hr-avi" src="${DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" style="width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0">
                            <div class="rc-who">
                                <div class="rc-name hr-name">${shortNpub(reviewerNpub)}</div>
                                <div class="rc-npub">${shortNpub(reviewerNpub)}</div>
                            </div>
                            <div class="rc-right">
                                ${starsHtml(review.rating, '1rem')}
                                <div class="rc-date">${fmtDate(review.created_at)}</div>
                            </div>
                        </div>
                        <div class="rc-body">${content}</div>
                        ${categories ? `<div class="rc-foot"><div class="rc-tags">${categories}</div></div>` : ''}
                    </div>
                `;
            } else {
                // Show who was reviewed (subject = p tag)
                const pTag = review.tags.find(t => t[0] === 'p');
                const subjectPubkey = pTag ? pTag[1] : null;
                const subjectNpub = subjectPubkey ? NostrTools.nip19.npubEncode(subjectPubkey) : 'Unknown';
                const content = escapeHtml(capLength(review.content, 500));
                const categories = review.categories.map(catTag).join('');
                html += `
                    <div class="rc anim" data-hspk="${subjectPubkey || ''}" data-rid="${review.id}">
                        <div class="rc-top">
                            <img class="rc-avi hs-avi" src="${DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" style="width:42px;height:42px;border-radius:50%;object-fit:cover;flex-shrink:0">
                            <div class="rc-who" style="flex:1">
                                <div class="rc-name" style="font-size:0.75rem;color:var(--text-3);">Review of</div>
                                <div class="hs-name rc-npub" style="cursor:pointer;color:var(--accent);"
                                    onclick="document.getElementById('npubInput').value='${escapeHtml(subjectNpub)}'; switchTab('lookup'); lookupProfile();">
                                    ${shortNpub(subjectNpub)}
                                </div>
                            </div>
                            <div class="rc-right">
                                ${starsHtml(review.rating, '1rem')}
                                <div class="rc-date">${fmtDate(review.created_at)}</div>
                            </div>
                        </div>
                        <div class="rc-body">${content}</div>
                        <div class="rc-foot">
                            <div class="rc-tags">${categories}</div>
                            <button class="btn-red" onclick="window._del('${review.id}','history')">Delete</button>
                        </div>
                    </div>
                `;
            }
        }

        area.innerHTML = html;

        // Lazy-load profile data for all cards
        if (isReceived) {
            for (const review of parsed) {
                getProfile(review.pubkey).then(profile => {
                    if (!profile) return;
                    const card = area.querySelector(`[data-hrpk="${review.pubkey}"]`);
                    if (!card) return;
                    if (profile.display_name || profile.name) {
                        const el = card.querySelector('.hr-name');
                        if (el) el.textContent = capLength(profile.display_name || profile.name, 30);
                    }
                    if (profile.picture) {
                        const img = card.querySelector('.hr-avi');
                        if (img) img.src = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
                    }
                }).catch(() => {});
            }
        } else {
            for (const review of parsed) {
                const subjectPubkey = review.tags.find(t => t[0] === 'p')?.[1];
                if (!subjectPubkey) continue;
                getProfile(subjectPubkey).then(profile => {
                    if (!profile) return;
                    const card = area.querySelector(`[data-hspk="${subjectPubkey}"]`);
                    if (!card) return;
                    if (profile.display_name || profile.name) {
                        const el = card.querySelector('.hs-name');
                        if (el) el.textContent = capLength(profile.display_name || profile.name, 30);
                    }
                    if (profile.picture) {
                        const img = card.querySelector('.hs-avi');
                        if (img) img.src = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
                    }
                }).catch(() => {});
            }
        }
    }

    // =====================================================================
    // FEATURED — Top Rated Profiles (front page)
    // =====================================================================

    /**
     * Fetch recent review events from relays (not filtered by subject),
     * aggregate by subject pubkey, calculate average rating,
     * and return the top rated profiles.
     */
    // =====================================================================
    // LEADERBOARDS
    // =====================================================================

    const LB_WINDOWS = [
        { key: '24h',    label: '24 hours',  seconds: 60 * 60 * 24 },
        { key: '7d',     label: '7 days',    seconds: 60 * 60 * 24 * 7 },
        { key: '30d',    label: '30 days',   seconds: 60 * 60 * 24 * 30 },
        { key: 'alltime',label: 'All time',  seconds: null },
    ];

    let currentLbWindow = 'alltime';

    /**
     * Rank profiles by average rating within a time window.
     * sinceTs: unix timestamp (null = all time)
     */
    async function fetchRanked(sinceTs) {
        const p = await initPool();
        const filter = { kinds: [REVIEW_KIND], limit: 500 };
        if (sinceTs) filter.since = sinceTs;

        try {
            const events = await p.querySync(RELAYS, filter);
            if (!events.length) return [];

            const deduped = deduplicateReviews(events);
            const subjects = new Map();

            for (const event of deduped) {
                const subjectPubkey = event.tags.find(t => t[0] === 'p')?.[1];
                if (!subjectPubkey) continue;
                const ratingTag = event.tags.find(t => t[0] === 'rating');
                const rating = ratingTag ? parseInt(ratingTag[1]) || 0 : 0;
                if (rating < 1 || rating > 5) continue;

                if (!subjects.has(subjectPubkey)) subjects.set(subjectPubkey, { total: 0, count: 0 });
                const e = subjects.get(subjectPubkey);
                e.total += rating;
                e.count++;
            }

            return Array.from(subjects.entries())
                .map(([pubkey, d]) => ({
                    pubkey,
                    avgRating: (d.total / d.count).toFixed(1),
                    reviewCount: d.count
                }))
                .filter(e => e.reviewCount >= 1)
                .sort((a, b) => {
                    const diff = parseFloat(b.avgRating) - parseFloat(a.avgRating);
                    return diff !== 0 ? diff : b.reviewCount - a.reviewCount;
                })
                .slice(0, 6);
        } catch (e) {
            console.warn('fetchRanked error:', e);
            return [];
        }
    }

    /** Top 3 locked, shuffle 3 more from the rest of the pool */
    function buildSelection(ranked, extraCount = 9) {
        const top3 = ranked.slice(0, 3);
        const rest = ranked.slice(3);
        // Fisher-Yates shuffle the remainder
        for (let i = rest.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [rest[i], rest[j]] = [rest[j], rest[i]];
        }
        return [...top3, ...rest.slice(0, extraCount)];
    }

    /** Render a leaderboard grid into `container` */
    function renderLbGrid(container, ranked) {
        if (!ranked.length) {
            container.innerHTML = '<div class="empty anim">No reviews in this period yet.</div>';
            return;
        }

        const selection = buildSelection(ranked);

        const rankLabel = (i) => {
            if (i === 0) return '<div class="fc-rank gold">#1</div>';
            if (i === 1) return '<div class="fc-rank silver">#2</div>';
            if (i === 2) return '<div class="fc-rank bronze">#3</div>';
            return '';
        };

        container.innerHTML = selection.map((entry, i) => {
            const npub = NostrTools.nip19.npubEncode(entry.pubkey);
            return `
                <div class="featured-card anim" style="animation-delay:${i * 0.05}s"
                    onclick="document.getElementById('npubInput').value='${escapeHtml(npub)}'; switchTab('lookup'); lookupProfile();">
                    ${rankLabel(i)}
                    <div class="fc-top">
                        <img class="fc-avi" src="${DEFAULT_AVATAR}" onerror="this.src='${DEFAULT_AVATAR}'" data-fc-pk="${entry.pubkey}">
                        <div style="min-width:0;flex:1">
                            <div class="fc-name" data-fc-name="${entry.pubkey}" style="color:var(--text-3);font-weight:400;font-style:italic">Loading...</div>
                            <div class="fc-npub">${shortNpub(npub)}</div>
                        </div>
                    </div>
                    <div class="fc-bottom">
                        <div class="fc-score">${entry.avgRating}</div>
                        <div class="fc-meta">
                            ${starsHtml(Math.round(entry.avgRating), '0.9rem')}<br>
                            ${entry.reviewCount} review${entry.reviewCount !== 1 ? 's' : ''}
                        </div>
                    </div>
                </div>
            `;
        }).join('');

        // Lazy-load names and avatars
        for (const entry of selection) {
            getProfile(entry.pubkey).then(profile => {
                if (!profile) return;
                const nameEl = container.querySelector(`[data-fc-name="${entry.pubkey}"]`);
                const imgEl  = container.querySelector(`[data-fc-pk="${entry.pubkey}"]`);
                if (nameEl && (profile.display_name || profile.name)) {
                    nameEl.textContent = capLength(profile.display_name || profile.name, 20);
                    nameEl.style.color = '';
                    nameEl.style.fontWeight = '';
                    nameEl.style.fontStyle = '';
                }
                if (imgEl && profile.picture) imgEl.src = sanitizeUrl(profile.picture);
            });
        }
    }

    // Cache ranked results per window so tab switching is instant
    const lbCache = {};

    async function renderFeatured() {
        const area = document.getElementById('featuredArea');

        const tabsHtml = LB_WINDOWS.map(w => `
            <button class="lb-tab ${currentLbWindow === w.key ? 'active' : ''}"
                onclick="window._lbSwitch('${w.key}')">${w.label}</button>
        `).join('');

        area.innerHTML = `
            <div class="featured-section">
                <div class="lb-header">
                    <div class="lb-title">Top rated</div>
                    <button class="featured-header button" onclick="window._lbShuffle()" style="background:none;border:none;color:var(--text-3);font-family:inherit;font-size:0.82rem;cursor:pointer;transition:color 0.15s;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--text-3)'">Shuffle</button>
                </div>
                <div class="lb-tabs">${tabsHtml}</div>
                <div class="lb-grid" id="lbGrid">
                    <div class="loader anim"><div class="spin"></div>Loading...</div>
                </div>
            </div>
        `;

        await loadLbWindow(currentLbWindow);
    }

    async function loadLbWindow(key) {
        const grid = document.getElementById('lbGrid');
        if (!grid) return;

        // Update tab active state
        document.querySelectorAll('.lb-tab').forEach(b => {
            b.classList.toggle('active', b.textContent.trim() === LB_WINDOWS.find(w => w.key === key)?.label);
        });

        // Use cache if available
        if (lbCache[key]) {
            renderLbGrid(grid, lbCache[key]);
            return;
        }

        grid.innerHTML = '<div class="loader anim"><div class="spin"></div>Loading...</div>';

        const win = LB_WINDOWS.find(w => w.key === key);
        const sinceTs = win?.seconds ? Math.floor(Date.now() / 1000) - win.seconds : null;
        const ranked = await fetchRanked(sinceTs);
        lbCache[key] = ranked;
        renderLbGrid(grid, ranked);
    }

    window._lbSwitch = async function(key) {
        currentLbWindow = key;
        await loadLbWindow(key);
    };

    // Shuffle re-renders with a new random pick from cached ranked data
    window._lbShuffle = function() {
        const grid = document.getElementById('lbGrid');
        if (!grid || !lbCache[currentLbWindow]) return;
        renderLbGrid(grid, lbCache[currentLbWindow]);
    };

    // =====================================================================
    // INIT
    // =====================================================================

    await initPool();
    console.log('PubScore initialized');

    // Load featured profiles on the front page
    renderFeatured();

    </script>
