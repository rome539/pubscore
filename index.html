<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>PubScore</title>

    <!-- Primary SEO -->
    <meta name="description" content="PubScore is a Nostr-native rating and review page for npubs. Public, signed reviews stored on relays.">

    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="PubScore">
    <meta property="og:description" content="Rate and review Nostr npubs with signed, public events.">
    <meta property="og:url" content="https://pubscore.space/">
    <meta property="og:image" content="https://pubscore.space/og-preview.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="PubScore">
    <meta name="twitter:description" content="Rate and review Nostr npubs with signed, public events.">
    <meta name="twitter:image" content="https://pubscore.space/og-preview.png">

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">

    <!-- Security: Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="
        default-src 'self';
        script-src 'self' 'unsafe-inline' https://unpkg.com https://cdn.jsdelivr.net https://esm.sh;
        style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src 'self' https://fonts.gstatic.com data:;
        img-src 'self' https: data: blob:;
        media-src 'self' https: data: blob:;
        connect-src 'self' https: wss:;
        object-src 'none';
        base-uri 'self';
        form-action 'self';
        frame-ancestors 'none';
        upgrade-insecure-requests;
    ">
    <meta name="referrer" content="no-referrer">
    <meta http-equiv="X-Content-Type-Options" content="nosniff">

    <!-- Fonts: Fraunces (serif display) + Karla (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,500;0,9..144,700;0,9..144,800;1,9..144,400&family=Karla:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* ================================================================
           DESIGN TOKENS
           ================================================================ */
        :root {
            --bg: #09090b;
            --bg-raised: #121215;
            --bg-elevated: #19191d;
            --bg-hover: #1f1f25;

            --border: rgba(255, 255, 255, 0.06);
            --border-strong: rgba(255, 255, 255, 0.1);

            --text: #ededef;
            --text-2: #a0a0a8;
            --text-3: #606068;

            --accent: #e8c46c;
            --accent-dim: #c9a44e;
            --accent-bg: rgba(232, 196, 108, 0.08);
            --accent-border: rgba(232, 196, 108, 0.2);

            --red: #d45454;
            --red-bg: rgba(212, 84, 84, 0.08);
            --red-border: rgba(212, 84, 84, 0.25);

            --green: #4eca82;
            --green-bg: rgba(78, 202, 130, 0.08);

            --blue: #5b9cf5;
            --blue-bg: rgba(91, 156, 245, 0.08);

            --r: 10px;
        }

        /* ================================================================
           RESET & BASE
           ================================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Karla', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* ================================================================
           TOP BAR — sticky header with brand, nav, auth
           ================================================================ */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .topbar-inner {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 32px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .brand {
            font-family: 'Fraunces', serif;
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .brand em {
            font-style: italic;
            font-weight: 400;
            color: var(--accent);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* Nav pill tabs */
        .topbar-nav {
            display: flex;
            gap: 2px;
            margin-right: 12px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 3px;
        }

        .topbar-nav button {
            background: none;
            border: none;
            color: var(--text-3);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .topbar-nav button:hover {
            color: var(--text-2);
        }

        .topbar-nav button.active {
            color: var(--text);
            background: var(--bg-elevated);
        }

        /* Auth pill — shows "Sign in" or user avatar+name */
        .auth-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 5px 16px 5px 6px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 100px;
            cursor: pointer;
            transition: border-color 0.15s;
            font-family: inherit;
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
        }

        .auth-pill:hover {
            border-color: var(--border-strong);
        }

        .auth-pill img {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            object-fit: cover;
        }

        .auth-pill-ph {
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--bg-elevated);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-pill-ph svg {
            width: 14px;
            height: 14px;
            fill: none;
            stroke: var(--text-3);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ================================================================
           MAIN CONTENT AREA
           ================================================================ */
        .main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 32px 120px;
        }

        /* ================================================================
           SEARCH INPUT
           ================================================================ */
        .search-wrap {
            position: relative;
            margin-bottom: 36px;
        }

        .search-wrap input {
            width: 100%;
            padding: 18px 140px 18px 22px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .search-wrap input::placeholder {
            color: var(--text-3);
        }

        .search-wrap input:focus {
            border-color: var(--accent-border);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        .search-wrap button {
            position: absolute;
            right: 7px;
            top: 50%;
            transform: translateY(-50%);
            padding: 12px 24px;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 7px;
            font-family: inherit;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }

        .search-wrap button:hover {
            background: var(--accent-dim);
        }

        /* ================================================================
           TOAST NOTIFICATIONS — floating pill at bottom center
           ================================================================ */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            padding: 14px 28px;
            border-radius: 100px;
            font-size: 0.9rem;
            font-weight: 500;
            pointer-events: none;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.info {
            background: var(--bg-elevated);
            border: 1px solid var(--border-strong);
            color: var(--text-2);
        }

        .toast.success {
            background: #12291c;
            border: 1px solid rgba(78, 202, 130, 0.3);
            color: var(--green);
        }

        .toast.error {
            background: #291212;
            border: 1px solid var(--red-border);
            color: var(--red);
        }

        /* ================================================================
           PROFILE CARD
           ================================================================ */
        .profile-card {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 32px;
            margin-bottom: 28px;
        }

        .pc-top {
            display: flex;
            gap: 22px;
            align-items: center;
        }

        .pc-avatar {
            width: 84px;
            height: 84px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--border-strong);
            flex-shrink: 0;
        }

        .pc-info {
            flex: 1;
            min-width: 0;
        }

        .pc-name {
            font-family: 'Fraunces', serif;
            font-size: 1.7rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .pc-nip05 {
            font-size: 0.88rem;
            color: var(--green);
            margin-top: 3px;
            font-weight: 500;
        }

        .pc-npub {
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-3);
            margin-top: 5px;
            word-break: break-all;
            line-height: 1.4;
        }

        .pc-bio {
            color: var(--text-2);
            font-size: 0.95rem;
            line-height: 1.55;
            margin-top: 18px;
            padding-top: 18px;
            border-top: 1px solid var(--border);
        }

        .pc-rating-row {
            display: flex;
            align-items: center;
            gap: 24px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .pc-big-score {
            font-family: 'Fraunces', serif;
            font-size: 3rem;
            font-weight: 800;
            color: var(--accent);
            line-height: 1;
        }

        .pc-score-detail {
            font-size: 0.88rem;
            color: var(--text-3);
            line-height: 1.5;
        }

        .pc-score-detail strong {
            color: var(--text-2);
            font-weight: 600;
        }

        /* ================================================================
           STARS
           ================================================================ */
        .stars {
            display: inline-flex;
            gap: 1px;
            font-size: 1rem;
            line-height: 1;
        }

        .star {
            color: var(--border-strong);
        }

        .star.filled {
            color: var(--accent);
        }

        /* ================================================================
           REVIEW FORM
           ================================================================ */
        .review-form {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 28px;
            margin-bottom: 28px;
        }

        .rf-title {
            font-family: 'Fraunces', serif;
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 22px;
        }

        .rf-row {
            margin-bottom: 16px;
        }

        .rf-label {
            font-size: 0.78rem;
            font-weight: 600;
            color: var(--text-3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 10px;
        }

        /* Star rating input */
        .star-input {
            display: flex;
            gap: 2px;
        }

        .star-input button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 2rem;
            color: var(--border-strong);
            transition: color 0.1s, transform 0.1s;
            padding: 0 3px;
            line-height: 1;
        }

        .star-input button:hover {
            transform: scale(1.12);
        }

        .star-input button.filled {
            color: var(--accent);
        }

        /* Category tag buttons */
        .cat-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .cat-tag {
            padding: 7px 14px;
            border: 1px solid var(--border);
            border-radius: 100px;
            background: transparent;
            color: var(--text-3);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .cat-tag:hover {
            color: var(--text-2);
            border-color: var(--border-strong);
        }

        .cat-tag.sel {
            color: var(--accent);
            border-color: var(--accent-border);
            background: var(--accent-bg);
        }

        .cat-tag[data-cat="warning"].sel {
            color: var(--red);
            border-color: var(--red-border);
            background: var(--red-bg);
        }

        /* Textarea */
        .rf-textarea {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            line-height: 1.55;
            resize: vertical;
            min-height: 110px;
            outline: none;
            transition: border-color 0.2s;
        }

        .rf-textarea::placeholder {
            color: var(--text-3);
        }

        .rf-textarea:focus {
            border-color: var(--accent-border);
            box-shadow: 0 0 0 3px var(--accent-bg);
        }

        /* ================================================================
           BUTTONS
           ================================================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 12px 22px;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--bg-elevated);
            color: var(--text);
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }

        .btn:hover {
            background: var(--bg-hover);
            border-color: var(--border-strong);
        }

        .btn-accent {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
            font-weight: 600;
        }

        .btn-accent:hover {
            background: var(--accent-dim);
            border-color: var(--accent-dim);
        }

        .btn-red {
            background: transparent;
            border: none;
            color: var(--text-3);
            font-family: inherit;
            font-size: 0.82rem;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.15s;
        }

        .btn-red:hover {
            color: var(--red);
            background: var(--red-bg);
        }

        /* ================================================================
           REVIEWS LIST — header + sort pills
           ================================================================ */
        .reviews-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .reviews-header h3 {
            font-family: 'Fraunces', serif;
            font-size: 1.15rem;
            font-weight: 600;
        }

        .sort-pills {
            display: flex;
            gap: 2px;
        }

        .sort-pill {
            background: none;
            border: none;
            color: var(--text-3);
            font-family: inherit;
            font-size: 0.8rem;
            font-weight: 500;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .sort-pill:hover {
            color: var(--text-2);
        }

        .sort-pill.on {
            color: var(--accent);
            background: var(--accent-bg);
        }

        /* ================================================================
           HISTORY SUB-TABS
           ================================================================ */
        .hist-tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 16px;
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 4px;
        }

        .hist-tab {
            flex: 1;
            background: none;
            border: none;
            color: var(--text-3);
            font-family: inherit;
            font-size: 0.88rem;
            font-weight: 500;
            padding: 10px 16px;
            border-radius: 7px;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .hist-tab:hover {
            color: var(--text-2);
        }

        .hist-tab.active {
            background: var(--bg-elevated);
            color: var(--text);
        }

        .hist-tab-count {
            background: var(--bg-elevated);
            color: var(--text-3);
            font-size: 0.75rem;
            font-weight: 600;
            padding: 1px 7px;
            border-radius: 100px;
            min-width: 22px;
            text-align: center;
        }

        .hist-tab.active .hist-tab-count {
            background: var(--accent-bg);
            color: var(--accent);
        }

        /* ================================================================
           REVIEW CARDS
           ================================================================ */
        .rc {
            background: var(--bg-raised);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 22px 24px;
            margin-bottom: 10px;
            transition: border-color 0.15s;
        }

        .rc:hover {
            border-color: var(--border-strong);
        }

        .rc-top {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
        }

        .rc-avi {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .rc-who {
            flex: 1;
            min-width: 0;
        }

        .rc-name {
            font-weight: 600;
            font-size: 0.95rem;
        }

        .rc-npub {
            font-family: monospace;
            font-size: 0.72rem;
            color: var(--text-3);
        }

        .rc-right {
            text-align: right;
            flex-shrink: 0;
        }

        .rc-date {
            font-size: 0.78rem;
            color: var(--text-3);
            margin-top: 2px;
        }

        .rc-body {
            color: var(--text-2);
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .rc-foot {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: 10px;
        }

        .rc-tags {
            display: flex;
            gap: 5px;
        }

        /* Category tags on review cards */
        .rtag {
            padding: 3px 10px;
            border-radius: 100px;
            font-size: 0.72rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }

        .rtag-trade { background: var(--accent-bg); color: var(--accent); }
        .rtag-knowledge { background: var(--blue-bg); color: var(--blue); }
        .rtag-helpful { background: var(--green-bg); color: var(--green); }
        .rtag-warning { background: var(--red-bg); color: var(--red); }

        /* ================================================================
           LOGIN DRAWER — slides in from right
           ================================================================ */
        .drawer-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 100;
        }

        .drawer-bg.open {
            display: block;
        }

        .drawer {
            position: fixed;
            top: 0;
            right: -420px;
            width: 400px;
            max-width: 90vw;
            height: 100vh;
            background: var(--bg-raised);
            border-left: 1px solid var(--border);
            z-index: 101;
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
        }

        .drawer.open {
            right: 0;
        }

        .drawer-head {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .drawer-head h2 {
            font-family: 'Fraunces', serif;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .drawer-close {
            background: none;
            border: none;
            color: var(--text-3);
            cursor: pointer;
            padding: 4px;
            border-radius: 6px;
            line-height: 1;
            font-size: 1.2rem;
        }

        .drawer-close:hover {
            color: var(--text);
        }

        .drawer-body {
            padding: 24px;
            flex: 1;
            overflow-y: auto;
        }

        .drawer-body p {
            color: var(--text-3);
            font-size: 0.9rem;
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Login method buttons */
        .login-opt {
            display: flex;
            align-items: center;
            gap: 14px;
            width: 100%;
            padding: 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: var(--r);
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
            text-align: left;
            margin-bottom: 10px;
        }

        .login-opt:hover {
            border-color: var(--accent-border);
            background: var(--bg-elevated);
        }

        .login-opt-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: var(--accent-bg);
            border: 1px solid var(--accent-border);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .login-opt-icon svg {
            width: 20px;
            height: 20px;
            fill: none;
            stroke: var(--accent);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .login-opt-text small {
            display: block;
            color: var(--text-3);
            font-size: 0.78rem;
            font-weight: 400;
            margin-top: 2px;
        }

        /* nsec input panel (hidden by default) */
        .nsec-panel {
            display: none;
            margin-top: 16px;
        }

        .nsec-panel.show {
            display: block;
        }

        .nsec-warn {
            padding: 14px 16px;
            background: var(--red-bg);
            border: 1px solid var(--red-border);
            border-radius: 8px;
            font-size: 0.82rem;
            color: var(--red);
            line-height: 1.5;
            margin-bottom: 14px;

    <!-- ================================================================
         JAVASCRIPT
         ================================================================ -->
    <script type="module">

    // =====================================================================
    // SECURITY KIT — Sanitization utilities
    // =====================================================================

    /**
     * Escapes HTML special characters to prevent XSS.
     * Use on ALL user-supplied strings before innerHTML.
     */
    function escapeHtml(unsafe) {
        if (!unsafe) return '';
        return unsafe
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    /**
     * Blocks dangerous URL protocols (javascript:, data:, vbscript:, file:).
     * Use on any URL from relay data before setting as src/href.
     */
    function sanitizeUrl(url) {
        if (!url || typeof url !== 'string') return '';
        const trimmed = url.trim().toLowerCase();
        if (trimmed.startsWith('javascript:') || trimmed.startsWith('data:') ||
            trimmed.startsWith('vbscript:') || trimmed.startsWith('file:')) {
            return '';
        }
        return url.trim();
    }

    /**
     * Caps string length to prevent DOM bloat from malicious data.
     */
    function capLength(text, maxLen, ellipsis = true) {
        if (!text || typeof text !== 'string') return '';
        if (text.length <= maxLen) return text;
        return text.substring(0, maxLen) + (ellipsis ? '...' : '');
    }

    /** Sanitize display name: cap at 100 chars + HTML escape */
    function sanitizeDisplayName(name) {
        return escapeHtml(capLength(name, 100, false));
    }

    /** Sanitize bio: cap + HTML escape, returns { preview, full } */
    function sanitizeBio(about, previewLen = 150) {
        const safe = capLength(about, 500, false);
        return {
            preview: escapeHtml(capLength(safe, previewLen)),
            full: escapeHtml(safe)
        };
    }

    /** Sanitize NIP-05: truncate long usernames */
    function sanitizeNip05(nip05) {
        if (!nip05) return '';
        let display = escapeHtml(nip05);
        if (display.length > 30) {
            const atIndex = display.indexOf('@');
            if (atIndex > 0) {
                const username = display.substring(0, atIndex);
                const domain = display.substring(atIndex);
                if (username.length > 10) {
                    display = username.substring(0, 10) + '...' + domain;
                }
            } else {
                display = display.substring(0, 28) + '...';
            }
        }
        return display;
    }

    // =====================================================================
    // SECURITY KIT — Secure Key Store (closure-based, no .get())
    // =====================================================================

    /**
     * Private key held inside closure. XSS cannot read it —
     * can only trigger signEvent() which returns a signed event.
     * Key bytes zeroed on clear().
     */
    function createSecureKeyStore(NostrTools) {
        let _secretKey = null;

        return Object.freeze({
            set(key) {
                _secretKey = key;
            },
            has() {
                return _secretKey !== null;
            },
            clear() {
                if (_secretKey) {
                    for (let i = 0; i < _secretKey.length; i++) _secretKey[i] = 0;
                    _secretKey = null;
                }
            },
            signEvent(event) {
                if (!_secretKey) throw new Error('No key available');
                return NostrTools.finalizeEvent(event, _secretKey);
            }
        });
    }

    // =====================================================================
    // SECURITY KIT — Inactivity Auto-Logout (for nsec sessions)
    // =====================================================================

    /**
     * Monitors mouse, keyboard, scroll, touch events.
     * If no activity for timeoutMs, calls onLogout.
     */
    function createInactivityMonitor({ timeoutMs = 15 * 60 * 1000, onLogout, isNsecSession }) {
        let timer = null;
        let lastActivity = Date.now();

        function reset() {
            lastActivity = Date.now();
            if (!isNsecSession()) return;
            if (timer) clearTimeout(timer);
            timer = setTimeout(onLogout, timeoutMs);
        }

        const events = ['mousedown', 'keydown', 'scroll', 'touchstart', 'click'];
        const handler = () => { if (isNsecSession()) reset(); };
        events.forEach(evt => document.addEventListener(evt, handler, { passive: true }));

        const visHandler = () => {
            if (!isNsecSession()) return;
            if (!document.hidden) {
                if (Date.now() - lastActivity > timeoutMs) onLogout();
                else reset();
            }
        };
        document.addEventListener('visibilitychange', visHandler);

        return {
            reset,
            destroy() {
                if (timer) { clearTimeout(timer); timer = null; }
                events.forEach(evt => document.removeEventListener(evt, handler));
                document.removeEventListener('visibilitychange', visHandler);
            }
        };
    }

    // =====================================================================
    // APP STATE & CONFIG
    // =====================================================================

    import * as NostrTools from "https://esm.sh/nostr-tools@2.7.2";

    const RELAYS = [
        'wss://relay.damus.io',
        'wss://relay.nostr.band',
        'wss://nos.lol',
        'wss://relay.snort.social',
        'wss://relay.primal.net'
    ];

    // Review event kind — parameterized replaceable in app-specific range
    const REVIEW_KIND = 38383;

    let pool = null;
    let currentUser = null;
    let SecureKeyStore = null;
    let inactivityMonitor = null;
    let currentLookupPubkey = null;
    let currentReviews = [];
    let currentSort = 'newest';
    let currentPage = 0;
    const REVIEWS_PER_PAGE = 5;

    // Default avatar SVG (data URI)
    const DEFAULT_AVATAR = 'data:image/svg+xml,' + encodeURIComponent(
        '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80">' +
        '<rect fill="%23121215" width="80" height="80" rx="40"/>' +
        '<circle cx="40" cy="30" r="12" fill="%23252530"/>' +
        '<ellipse cx="40" cy="66" rx="22" ry="16" fill="%23252530"/>' +
        '</svg>'
    );

    /** Initialize the relay connection pool */
    async function initPool() {
        if (pool) return pool;
        const { SimplePool } = await import("https://esm.sh/nostr-tools@2.7.2/pool");
        pool = new SimplePool();
        return pool;
    }

    // Initialize secure key store
    SecureKeyStore = createSecureKeyStore(NostrTools);

    // Wipe keys on page unload
    window.addEventListener('beforeunload', () => {
        SecureKeyStore.clear();
        if (inactivityMonitor) {
            inactivityMonitor.destroy();
            inactivityMonitor = null;
        }
    });

    // =====================================================================
    // AUTH — Login / Logout
    // =====================================================================

    /** Login via NIP-07 browser extension (Alby, nos2x, etc.) */
    async function loginWithExtension() {
        if (typeof window.nostr === 'undefined') {
            throw new Error('No Nostr browser extension found.');
        }
        const pubkey = await window.nostr.getPublicKey();
        const npub = NostrTools.nip19.npubEncode(pubkey);
        const profile = await fetchProfile(pubkey);
        currentUser = { pubkey, npub, profile, loginMethod: 'extension' };
        return currentUser;
    }

    /** Login via nsec private key (stored in SecureKeyStore closure) */
    async function loginWithNsec(nsecString) {
        if (!nsecString) throw new Error('Enter your nsec');
        if (!nsecString.startsWith('nsec1')) throw new Error('Invalid nsec format');

        const { data: secretKey } = NostrTools.nip19.decode(nsecString);
        if (secretKey.length !== 32) throw new Error('Invalid key length');

        const pubkey = NostrTools.getPublicKey(secretKey);
        const npub = NostrTools.nip19.npubEncode(pubkey);

        SecureKeyStore.set(secretKey);
        const profile = await fetchProfile(pubkey);
        currentUser = { pubkey, npub, profile, loginMethod: 'nsec' };

        // Start inactivity auto-logout timer
        inactivityMonitor = createInactivityMonitor({
            timeoutMs: 15 * 60 * 1000,
            onLogout: () => {
                doLogout();
                toast('Auto-logged out after inactivity', 'info');
            },
            isNsecSession: () => currentUser?.loginMethod === 'nsec'
        });
        inactivityMonitor.reset();

        return currentUser;
    }

    /** Sign a Nostr event using the current auth method */
    async function signEvent(event) {
        if (!currentUser) throw new Error('Not logged in');
        if (currentUser.loginMethod === 'extension') {
            return await window.nostr.signEvent(event);
        }
        if (currentUser.loginMethod === 'nsec' && SecureKeyStore.has()) {
            return SecureKeyStore.signEvent(event);
        }
        throw new Error('No signing method available');
    }

    /** Logout — wipe keys, destroy monitors, reset UI */
    function doLogout() {
        currentUser = null;
        SecureKeyStore.clear();
        if (inactivityMonitor) {
            inactivityMonitor.destroy();
            inactivityMonitor = null;
        }
        updateAuthPill();
        toast('Signed out', 'info');
    }

    // =====================================================================
    // RELAY QUERIES
    // =====================================================================

    /** Fetch a profile (kind 0) from relays */
    async function fetchProfile(pubkey) {
        const p = await initPool();
        try {
            const event = await p.get(RELAYS, { kinds: [0], authors: [pubkey], limit: 1 });
            if (event) return JSON.parse(event.content);
        } catch (e) {
            console.warn('fetchProfile error:', e);
        }
        return {};
    }

    /** Fetch follows list (kind 3) from relays */
    async function fetchFollows(pubkey) {
        const p = await initPool();
        try {
            const event = await p.get(RELAYS, { kinds: [3], authors: [pubkey], limit: 1 });
            if (event) return event.tags.filter(t => t[0] === 'p').map(t => t[1]);
        } catch (e) {}
        return [];
    }

    /** Fetch follower count — how many people follow this pubkey (kind 3 #p tag) */
    async function fetchFollowerCount(pubkey) {
        const p = await initPool();
        try {
            const events = await p.querySync(RELAYS, { kinds: [3], '#p': [pubkey], limit: 500 });
            // Deduplicate by author (one follow-list per person)
            const authors = new Set(events.map(e => e.pubkey));
            return authors.size;
        } catch (e) {
            return 0;
        }
    }

    /** Check if a profile meets minimum social graph thresholds.
     *  Returns { ok: true } or { ok: false, reason: string }
     */
    async function checkProfileEligibility(pubkey, follows) {
        const MIN_FOLLOWING = 20;
        const MIN_FOLLOWERS = 10;

        if (follows.length < MIN_FOLLOWING) {
            return { ok: false, reason: `This profile follows fewer than ${MIN_FOLLOWING} people and can't be looked up.` };
        }

        const followerCount = await fetchFollowerCount(pubkey);
        if (followerCount < MIN_FOLLOWERS) {
            return { ok: false, reason: `This profile has fewer than ${MIN_FOLLOWERS} followers and can't be looked up.` };
        }

        return { ok: true };
    }

    /**
     * Deduplicate replaceable events.
     * Keeps only the newest event per author + d-tag combination.
     * Fixes issue where relays return both old and new versions.
     */
    function deduplicateReviews(events) {
        const map = new Map();
        for (const event of events) {
            const dTag = event.tags.find(t => t[0] === 'd')?.[1] || '';
            const key = `${event.pubkey}:${dTag}`;
            const existing = map.get(key);
            if (!existing || event.created_at > existing.created_at) {
                map.set(key, event);
            }
        }
        return Array.from(map.values());
    }

    /** Fetch all reviews for a given subject pubkey */
    async function fetchReviews(subjectPubkey) {
        const p = await initPool();
        try {
            const events = await p.querySync(RELAYS, {
                kinds: [REVIEW_KIND],
                '#p': [subjectPubkey]
            });
            return deduplicateReviews(events);
        } catch (e) {
            console.warn('fetchReviews error:', e);
            return [];
        }
    }

    /** Fetch all reviews written by a given pubkey */
    async function fetchMyReviews(myPubkey) {
        const p = await initPool();
        try {
            const events = await p.querySync(RELAYS, {
                kinds: [REVIEW_KIND],
                authors: [myPubkey]
            });
            return deduplicateReviews(events);
        } catch (e) {
            console.warn('fetchMyReviews error:', e);
            return [];
        }
    }

    /** Delete a review by publishing a kind 5 deletion event */
    async function deleteReview(eventId) {
        const event = {
            kind: 5,
            pubkey: currentUser.pubkey,
            created_at: Math.floor(Date.now() / 1000),
            tags: [['e', eventId], ['k', String(REVIEW_KIND)]],
            content: ''
        };
        const signed = await signEvent(event);
        const p = await initPool();
        await Promise.any(RELAYS.map(r => p.publish([r], signed)));
    }

    /** Publish (or update) a review for a subject pubkey */
    async function publishReview(subjectPubkey, rating, content, categories) {
        const tags = [
            ['p', subjectPubkey],
            ['d', subjectPubkey],  // Makes it replaceable per reviewer per subject
            ['rating', String(rating)]
        ];
        for (const cat of categories) {
            tags.push(['t', cat]);
        }

        const event = {
            kind: REVIEW_KIND,
            pubkey: currentUser.pubkey,
            created_at: Math.floor(Date.now() / 1000),
            tags,
            content
        };

        const signed = await signEvent(event);
        const p = await initPool();
        await Promise.any(RELAYS.map(r => p.publish([r], signed)));
    }

    /** Generate star rating HTML */
    function starsHtml(rating, size = '0.9rem') {
        let html = `<span class="stars" style="font-size:${size}">`;
        for (let i = 1; i <= 5; i++) {
            html += `<span class="star ${i <= rating ? 'filled' : ''}">&#9733;</span>`;

    function fmtDate(timestamp) {
        return new Date(timestamp * 1000).toLocaleDateString('en-US', {

            month: 'short',
            day: 'numeric'
        });

    /** Shorten an npub for display */
    function shortNpub(npub) {
        if (!npub || npub.length < 20) return npub || '';
        return npub.substring(0, 12) + '...' + npub.substring(npub.length - 6);
    }

    /** Generate a category tag badge */
    function catTag(category) {
        const labels = {
            trade: 'Trustworthy',
            knowledge: 'Knowledgeable',
            helpful: 'Helpful',
            warning: 'Warning'
        };
        const classes = {
            trade: 'rtag-trade',
            knowledge: 'rtag-knowledge',
            helpful: 'rtag-helpful',
            warning: 'rtag-warning'
        };
        return `<span class="rtag ${classes[category] || ''}">${escapeHtml(labels[category] || category)}</span>`;
    }

    /** Parse a review event into a usable object */
    function parseReview(event) {
        const ratingTag = event.tags.find(t => t[0] === 'rating');
        const rating = ratingTag ? Math.min(5, Math.max(1, parseInt(ratingTag[1]) || 0)) : 0;
        const categories = event.tags.filter(t => t[0] === 't').map(t => t[1]);
        return { ...event, rating, categories };
    }

    /** Sort reviews by the given criteria */
    function sortReviews(reviews, sortBy) {
        const parsed = reviews.map(parseReview);
        switch (sortBy) {
            case 'oldest':  return parsed.sort((a, b) => a.created_at - b.created_at);
            case 'highest': return parsed.sort((a, b) => b.rating - a.rating);
            case 'lowest':  return parsed.sort((a, b) => a.rating - b.rating);
            default:        return parsed.sort((a, b) => b.created_at - a.created_at); // newest
        }
    }

    // =====================================================================
    // PROFILE LOOKUP — supports npub, hex, and username search
    // =====================================================================

    /**
     * Search for profiles by username.
     *
     * Strategy (multi-layered):
     * 1. Check the local profileCache first (instant)
     * 2. Try NIP-50 search on relays that support it (relay.nostr.band)
     * 3. Try NIP-05 lookup if the query looks like user@domain
     * 4. Fall back to fetching a batch of recent kind 0s and filtering client-side
     */
    async function searchProfiles(query) {
        const q = query.toLowerCase().trim();
        if (!q) return [];

        const results = new Map(); // pubkey -> { pubkey, profile, score }

        /** Score a profile against the query — NIP-05 verified profiles rank higher */
        function matchProfile(pk, profile) {
            const displayName = (profile.display_name || '').toLowerCase();
            const name = (profile.name || '').toLowerCase();
            const nip05 = (profile.nip05 || '').toLowerCase();
            const either = displayName || name;
            const hasNip05 = !!nip05;

            let score = 0;
            if (displayName === q || name === q) score = 6;
            else if (displayName.startsWith(q) || name.startsWith(q)) score = 4;
            else if (either.includes(q) || nip05.includes(q)) score = 2;

            // Boost verified (NIP-05) profiles at every tier
            if (score > 0 && hasNip05) score += 1;

            // Extra boost if NIP-05 local part matches query exactly (e.g. "jack" -> jack@cash.app)
            const nip05Local = nip05.split('@')[0];
            if (nip05Local === q) score += 2;

            if (score > 0) {
                const existing = results.get(pk);
                if (!existing || score > existing.score) {
                    results.set(pk, { pubkey: pk, profile, score });
                }
            }
        }

        // 1. Search the local profileCache first (instant)
        for (const [pk, profile] of Object.entries(profileCache)) {
            matchProfile(pk, profile);
        }

        // 2. NIP-50 search on relay.nostr.band (supports search filter)
        const NIP50_RELAYS = ['wss://relay.nostr.band', 'wss://nostr.wine'];
        const p = await initPool();
        try {
            const nip50Events = await p.querySync(NIP50_RELAYS, {
                kinds: [0],
                search: q,
                limit: 10
            });
            for (const event of nip50Events) {
                try {
                    const profile = JSON.parse(event.content);
                    profileCache[event.pubkey] = profile;
                    // Always include NIP-50 results — relay already filtered by relevance
                    // Try to score by name, but if no name match still include with score 1
                    const existing = results.get(event.pubkey);
                    matchProfile(event.pubkey, profile);
                    if (!results.has(event.pubkey)) {
                        // No name matched but relay said it's relevant — include it
                        results.set(event.pubkey, { pubkey: event.pubkey, profile, score: 1 });
                    }
                } catch (e) {}
            }
        } catch (e) {
            console.warn('NIP-50 search error:', e);
        }

        // 3. NIP-05 lookup if query looks like user@domain or just a username
        //    Try querying nostr.directory and nostr.band lookup endpoints
        const nip05Candidates = [];
        if (q.includes('@')) {
            nip05Candidates.push(q);
        } else {
            // Try common domains for bare username
            nip05Candidates.push(`${q}@nostr.com`, `${q}@iris.to`, `${q}@snort.social`, `${q}@primal.net`);
        }

        // Run NIP-05 lookups in parallel with a short timeout
        await Promise.allSettled(nip05Candidates.map(async nip05addr => {
            try {
                const [user, domain] = nip05addr.split('@');
                if (!user || !domain) return;
                const resp = await fetch(
                    `https://${domain}/.well-known/nostr.json?name=${encodeURIComponent(user)}`,
                    { signal: AbortSignal.timeout(2000) }
                );
                if (!resp.ok) return;
                const data = await resp.json();
                const pk = data.names?.[user] || data.names?.[user.toLowerCase()];
                if (pk && /^[0-9a-f]{64}$/i.test(pk) && !results.has(pk)) {
                    const profile = await fetchProfile(pk);
                    profileCache[pk] = profile;
                    results.set(pk, { pubkey: pk, profile, score: 4 });
                }
            } catch (e) {}
        }));

        // 4. Fallback: fetch recent kind-0 batch and filter client-side
        //    Only do this if NIP-50 returned nothing
        if (results.size === 0) {
            try {
                const events = await p.querySync(RELAYS, {
                    kinds: [0],
                    limit: 500
                });
                for (const event of events) {
                    if (results.has(event.pubkey)) continue;
                    try {
                        const profile = JSON.parse(event.content);
                        matchProfile(event.pubkey, profile);
                        profileCache[event.pubkey] = profile;
                    } catch (e) {}
                }
            } catch (e) {
                console.warn('searchProfiles fallback relay fetch error:', e);
            }
        }

        // Sort by score (NIP-05 verified profiles naturally rank higher due to scoring boost)
        const sorted = Array.from(results.values()).sort((a, b) => b.score - a.score);

        // Eligibility is enforced on actual lookup — don't slow search down with extra relay queries
        // Prefer NIP-05 verified profiles — fill up to 8 slots with verified first,
        // then pad with unverified only if fewer than 4 verified results exist
        const verified = sorted.filter(r => r.profile && r.profile.nip05);
        const unverified = sorted.filter(r => !r.profile || !r.profile.nip05);
        return verified.length >= 4 ? verified.slice(0, 8) : [...verified, ...unverified].slice(0, 8);
    }

    /** Show search results dropdown */
    function showSearchResults(results, query) {
        closeSearchResults();
        const wrap = document.querySelector('.search-wrap');

        if (!results.length) {
            const el = document.createElement('div');
            el.className = 'search-results';
            el.innerHTML = `<div class="search-no-results">No profiles found for "${escapeHtml(query)}"</div>`;
            wrap.appendChild(el);
            setTimeout(() => el.remove(), 3000);

        }

        const el = document.createElement('div');
        el.className = 'search-results';

        for (const r of results) {
            const npub = NostrTools.nip19.npubEncode(r.pubkey);
            const profile = r.profile || {};
            const name = sanitizeDisplayName(profile.display_name || profile.name || '');
            const avatar = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
            const nip05 = profile.nip05 ? sanitizeNip05(profile.nip05) : '';

            const div = document.createElement('div');
            div.className = 'search-result';
            div.dataset.pk = r.pubkey;
            div.innerHTML = `
                <img class="sr-img" src="${avatar}" onerror="this.src='${DEFAULT_AVATAR}'">
                <div>
                    <div class="search-result-name sr-name">${name ? escapeHtml(name) : '<span style="color:var(--text-3);font-style:italic">Loading...</span>'}${nip05 ? ' <span style="font-size:0.7rem;color:var(--green);font-weight:700" title="NIP-05 Verified">✓</span>' : ''}</div>
                    ${nip05 ? `<div class="search-result-nip05 sr-nip05">${nip05}</div>` : '<div class="search-result-nip05 sr-nip05" style="display:none"></div>'}
                    <div class="search-result-npub">${shortNpub(npub)}</div>
                </div>
            `;
            div.addEventListener('click', () => {
                document.getElementById('npubInput').value = npub;
                closeSearchResults();
                lookupByPubkey(r.pubkey);
            });
            el.appendChild(div);
        }

        wrap.appendChild(el);

        // Lazy-load any missing profile metadata
        for (const r of results) {
            const hasName = r.profile?.display_name || r.profile?.name;
            const hasAvatar = r.profile?.picture;
            if (!hasName || !hasAvatar) {
                getProfile(r.pubkey).then(profile => {
                    if (!profile) return;
                    const card = el.querySelector(`[data-pk="${r.pubkey}"]`);
                    if (!card) return; // dropdown may have closed

                    const nameEl = card.querySelector('.sr-name');
                    const imgEl = card.querySelector('.sr-img');
                    const nip05El = card.querySelector('.sr-nip05');

                    if (nameEl && (profile.display_name || profile.name)) {
                        nameEl.textContent = sanitizeDisplayName(profile.display_name || profile.name);
                    }
                    if (imgEl && profile.picture) {
                        imgEl.src = sanitizeUrl(profile.picture) || DEFAULT_AVATAR;
                    }
                    if (nip05El && profile.nip05) {
                        const safe = sanitizeNip05(profile.nip05);
                        if (safe) {
                            nip05El.textContent = safe;
                            nip05El.style.display = '';
                        }
                    }
                }).catch(() => {});
            }
        }
    }

    /** Lookup by already-resolved pubkey (skip parsing) */
    async function lookupByPubkey(pubkey) {
        currentLookupPubkey = pubkey;
        currentPage = 0;

        // Hide featured section
        document.getElementById('featuredArea').style.display = 'none';

        // Show loading state
        document.getElementById('profileArea').innerHTML = '<div class="loader anim"><div class="spin"></div>Loading profile...</div>';
        document.getElementById('reviewFormArea').innerHTML = '';
        document.getElementById('reviewsArea').innerHTML = '';

        try {
            const [profile, follows, reviews] = await Promise.all([
                fetchProfile(pubkey),
                fetchFollows(pubkey),
                fetchReviews(pubkey)
            ]);

            // Eligibility gate: must follow 20+ and have 10+ followers
            const eligibility = await checkProfileEligibility(pubkey, follows);
            if (!eligibility.ok) {
                currentLookupPubkey = null;
                document.getElementById('profileArea').innerHTML = `
                    <div class="empty anim" style="padding:40px;text-align:center;">
                        <div style="font-size:2rem;margin-bottom:12px">🚫</div>
                        <div style="color:var(--text-2);font-size:0.95rem;">${escapeHtml(eligibility.reason)}</div>
                    </div>`;
                document.getElementById('featuredArea').style.display = '';
                return;
            }

            currentReviews = reviews;
            const npub = NostrTools.nip19.npubEncode(pubkey);

            renderProfileCard(pubkey, npub, profile, follows, reviews);
            await renderReviewForm();
            renderReviews(reviews);
        } catch (e) {
            console.error(e);
            toast('Error: ' + e.message, 'error');
            document.getElementById('profileArea').innerHTML = '';
        }
    }

    window.lookupProfile = async function() {
        const raw = document.getElementById('npubInput').value.trim();
        if (!raw) return toast('Enter an npub, hex pubkey, or username', 'error');

        closeSearchResults();

        // 1. Try npub
        if (raw.startsWith('npub1')) {
            try {
                const pubkey = NostrTools.nip19.decode(raw).data;
                return await lookupByPubkey(pubkey);
            } catch (e) {
                return toast('Invalid npub format', 'error');
            }
        }

        // 2. Try hex pubkey
        if (/^[0-9a-f]{64}$/i.test(raw)) {
            return await lookupByPubkey(raw.toLowerCase());
        }

        // 3. Username search
        document.getElementById('profileArea').innerHTML = '<div class="loader anim"><div class="spin"></div>Searching Nostr for "<b>' + escapeHtml(raw) + '</b>"...</div>';
        document.getElementById('featuredArea').style.display = 'none';
        document.getElementById('reviewFormArea').innerHTML = '';
        document.getElementById('reviewsArea').innerHTML = '';

        const results = await searchProfiles(raw);

        if (results.length === 1) {
            // Single result — go straight to it
            const npub = NostrTools.nip19.npubEncode(results[0].pubkey);
            document.getElementById('npubInput').value = npub;
            document.getElementById('profileArea').innerHTML = '';
            await lookupByPubkey(results[0].pubkey);
        } else if (results.length > 1) {
            // Multiple results — show dropdown
            document.getElementById('profileArea').innerHTML = '';
            document.getElementById('featuredArea').style.display = '';
            showSearchResults(results, raw);
        } else {
            // No results
            document.getElementById('profileArea').innerHTML = '';
            document.getElementById('featuredArea').style.display = '';
            toast('No profiles found for "' + raw + '"', 'error');
        }
    };
